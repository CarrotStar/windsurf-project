version: "3.9"

services:
  gridbot:
    build: .
    container_name: grid_trading_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./credentials:/app/credentials:ro
      - ./backtest_results:/app/backtest_results
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
